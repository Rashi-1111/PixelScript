<script>
    // Store original values when modal opens
    let originalValues = {};
    
    // When edit button is clicked
    document.querySelector('.edit-button').addEventListener('click', function() {
        // Store current values
        originalValues = {
            bio: document.querySelector('.bio-text').textContent,
            about: document.querySelector('.about-text').textContent,
            interest: document.querySelector('.interest-text').textContent,
            role: document.querySelector('.role-text').textContent
        };
        
        // Set values in modal
        document.querySelector('#bio').value = originalValues.bio;
        document.querySelector('#about').value = originalValues.about;
        document.querySelector('#interest').value = originalValues.interest;
        document.querySelector('#role').value = originalValues.role;
        
        // Show modal
        const modal = new bootstrap.Modal(document.getElementById('editProfileModal'));
        modal.show();
    });

    // Handle save changes
    document.querySelector('#saveProfileChanges').addEventListener('click', function() {
        // Update the profile with new values
        document.querySelector('.bio-text').textContent = document.querySelector('#bio').value;
        document.querySelector('.about-text').textContent = document.querySelector('#about').value;
        document.querySelector('.interest-text').textContent = document.querySelector('#interest').value;
        document.querySelector('.role-text').textContent = document.querySelector('#role').value;
        
        // Close modal
        const modal = bootstrap.Modal.getInstance(document.getElementById('editProfileModal'));
        modal.hide();
    });

    // When modal is hidden (either by clicking Cancel or clicking outside)
    document.getElementById('editProfileModal').addEventListener('hidden.bs.modal', function () {
        // If user clicked Cancel, values will automatically revert since we didn't save them
        // No need to do anything here
    });
</script>
<!-- Add this modal HTML before the closing body tag -->
<div class="modal fade" id="editProfileModal" tabindex="-1" aria-labelledby="editProfileModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editProfileModalLabel">Edit Profile</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="editProfileForm">
                    <div class="mb-3">
                        <label for="bio" class="form-label">Bio</label>
                        <textarea class="form-control" id="bio" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="about" class="form-label">About</label>
                        <textarea class="form-control" id="about" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="interest" class="form-label">Interest</label>
                        <input type="text" class="form-control" id="interest">
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">Role</label>
                        <input type="text" class="form-control" id="role">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveProfileChanges">Save changes</button>
            </div>
        </div>
    </div>
</div>
