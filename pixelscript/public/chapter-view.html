<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter View - PixelScript</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --reader-bg: #f4efe6;
            --reader-text: #1f1912;
            --reader-muted: rgba(31, 25, 18, 0.66);
            --chrome-bg: rgba(255, 252, 246, 0.84);
            --chrome-border: rgba(62, 47, 28, 0.12);
            --chip-bg: rgba(31, 25, 18, 0.08);
            --chip-text: #221b13;
            --panel-bg: #f6f1e8;
            --panel-surface: #fffdf9;
            --nav-bg: rgba(31, 25, 18, 0.78);
            --nav-text: #fff;
        }

        body.dark-mode {
            --reader-bg: #0f1014;
            --reader-text: #f4f1ea;
            --reader-muted: rgba(244, 241, 234, 0.7);
            --chrome-bg: rgba(12, 13, 18, 0.8);
            --chrome-border: rgba(255, 255, 255, 0.08);
            --chip-bg: rgba(255, 255, 255, 0.08);
            --chip-text: #fff;
            --panel-bg: #11131a;
            --panel-surface: #161922;
            --nav-bg: rgba(7, 8, 11, 0.82);
            --nav-text: #fff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Inter', Arial, sans-serif;
            background: var(--reader-bg);
            color: var(--reader-text);
            transition: background 0.25s ease, color 0.25s ease;
        }

        .page {
            min-height: 100vh;
            width: 100%;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 40;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 18px;
            background: var(--chrome-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--chrome-border);
            transition: transform 0.24s ease, opacity 0.24s ease, background 0.25s ease;
        }

        .topbar.hidden {
            transform: translateY(-100%);
            opacity: 0;
        }

        .chrome-btn,
        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 46px;
            height: 46px;
            padding: 0 16px;
            border-radius: 999px;
            border: 1px solid var(--chrome-border);
            background: var(--chip-bg);
            color: var(--reader-text);
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
        }

        .topbar-main {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .story-head {
            min-width: 0;
        }

        .story-head h1 {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--reader-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .story-subline {
            margin-top: 4px;
            color: var(--reader-muted);
            font-size: 0.92rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chapter-chip {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 14px;
            border-radius: 999px;
            background: var(--chip-bg);
            color: var(--chip-text);
            font-size: 0.9rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .reader-stage {
            min-height: 100vh;
            padding-top: 78px;
            background: var(--panel-bg);
        }

        .panel-stack {
            width: min(100vw, 1240px);
            margin: 0 auto;
            padding: 0 12px 100px;
        }

        .panel-frame {
            width: 100%;
            background: var(--panel-surface);
            overflow: hidden;
        }

        .panel-frame + .panel-frame {
            margin-top: 12px;
        }

        .panel-frame img {
            display: block;
            width: 100%;
            height: auto;
            background: var(--panel-surface);
        }

        .empty-state {
            width: min(100vw, 760px);
            margin: 42px auto 120px;
            padding: 28px;
            border-radius: 24px;
            background: var(--panel-surface);
            border: 1px solid var(--chrome-border);
            color: var(--reader-text);
            text-align: center;
            line-height: 1.7;
        }

        .chapter-nav {
            position: fixed;
            left: 50%;
            bottom: 22px;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 45;
        }

        .chapter-nav a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-width: 132px;
            padding: 13px 18px;
            border-radius: 999px;
            background: var(--nav-bg);
            color: var(--nav-text);
            text-decoration: none;
            font-weight: 700;
            backdrop-filter: blur(14px);
        }

        .chapter-nav a.disabled {
            opacity: 0.42;
            pointer-events: none;
        }

        .scroll-top-btn {
            position: fixed;
            right: 18px;
            bottom: 92px;
            width: 48px;
            height: 48px;
            border-radius: 999px;
            border: 1px solid var(--chrome-border);
            background: var(--nav-bg);
            color: var(--nav-text);
            cursor: pointer;
            z-index: 45;
        }

        @media (max-width: 720px) {
            .topbar {
                padding: 12px;
                gap: 10px;
            }

            .back-btn span,
            .chrome-btn span {
                display: none;
            }

            .story-head h1 {
                font-size: 1rem;
            }

            .story-subline {
                font-size: 0.82rem;
            }

            .chapter-chip {
                padding: 8px 12px;
                font-size: 0.82rem;
            }

            .chapter-nav {
                width: calc(100% - 24px);
            }

            .chapter-nav a {
                flex: 1;
                min-width: 0;
            }

            .panel-stack {
                width: 100%;
                padding: 0 0 100px;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <header class="topbar">
            <a id="back-link" class="back-btn" href="stories.html">
                <i class="fas fa-arrow-left"></i>
                <span>Back to Story</span>
            </a>
            <div class="topbar-main">
                <div class="story-head">
                    <h1 id="story-title"></h1>
                    <div id="story-detail-line" class="story-subline"></div>
                </div>
                <div id="chapter-meta-top" class="chapter-chip"></div>
            </div>
            <button id="theme-toggle" class="chrome-btn" type="button" aria-label="Toggle dark reader mode">
                <i class="fas fa-moon"></i>
                <span>Reader Mode</span>
            </button>
        </header>

        <section class="reader-stage">
            <div id="panel-stack" class="panel-stack"></div>
        </section>

        <nav class="chapter-nav">
            <a id="prev-link" href="#" class="disabled"><i class="fas fa-arrow-left"></i> Previous</a>
            <a id="next-link" href="#" class="disabled">Next <i class="fas fa-arrow-right"></i></a>
        </nav>

        <button id="scroll-top-btn" class="scroll-top-btn" type="button" title="Scroll to top">
            <i class="fas fa-arrow-up"></i>
        </button>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const storyId = params.get('story');
        const chapterId = params.get('chapter');
        const themeStorageKey = 'pixelscript-reader-theme';
        let lastScrollY = 0;

        function getToken() {
            return localStorage.getItem('token') || sessionStorage.getItem('token');
        }

        function getChapterPanels(story, chapter) {
            const chapterPanels = Array.isArray(chapter?.panels) ? chapter.panels.filter(panel => panel?.imageUrl) : [];
            if (chapterPanels.length) {
                return chapterPanels;
            }

            const boardPanels = Array.isArray(story?.projectBoard?.panels) ? story.projectBoard.panels.filter(panel => panel?.imageUrl) : [];
            if (boardPanels.length) {
                return boardPanels;
            }

            const fallbackPanels = [];
            if (story?.projectBoard?.canvasPreview) {
                fallbackPanels.push({
                    title: 'Panel 1',
                    imageUrl: story.projectBoard.canvasPreview
                });
            }
            (story?.projectBoard?.artwork || [])
                .filter(asset => asset?.url && asset.url !== story?.projectBoard?.canvasPreview)
                .forEach((asset, index) => {
                    fallbackPanels.push({
                        title: asset.name || `Panel ${fallbackPanels.length + index + 1}`,
                        imageUrl: asset.url
                    });
                });
            return fallbackPanels;
        }

        function renderPanels(story, chapter) {
            const panelStack = document.getElementById('panel-stack');
            const panels = getChapterPanels(story, chapter);

            if (!panels.length) {
                panelStack.innerHTML = `
                    <div class="empty-state">
                        <h2>No chapter panels yet</h2>
                        <p>This chapter does not have saved comic panels yet. Ask the collaborators to save their workspace canvases as chapter panels before publishing.</p>
                    </div>
                `;
                return;
            }

            panelStack.innerHTML = panels.map((panel, index) => `
                <article class="panel-frame">
                    <img src="${panel.imageUrl}" alt="${panel.title || `Chapter panel ${index + 1}`}">
                </article>
            `).join('');
        }

        function bindChapterNav(story) {
            const prev = document.getElementById('prev-link');
            const next = document.getElementById('next-link');
            const accessible = (story.chapters || []).filter(chapter => chapter.hasAccess);
            const currentAccessibleIndex = accessible.findIndex(chapter => String(chapter._id) === String(chapterId));

            const prevChapter = currentAccessibleIndex > 0 ? accessible[currentAccessibleIndex - 1] : null;
            const nextChapter = currentAccessibleIndex >= 0 && currentAccessibleIndex < accessible.length - 1
                ? accessible[currentAccessibleIndex + 1]
                : null;

            if (prevChapter) {
                prev.href = `chapter-view.html?story=${story._id}&chapter=${prevChapter._id}`;
                prev.classList.remove('disabled');
            } else {
                prev.classList.add('disabled');
            }

            if (nextChapter) {
                next.href = `chapter-view.html?story=${story._id}&chapter=${nextChapter._id}`;
                next.classList.remove('disabled');
            } else {
                next.classList.add('disabled');
            }
        }

        function setTheme(theme) {
            document.body.classList.toggle('dark-mode', theme === 'dark');
            localStorage.setItem(themeStorageKey, theme);
            const icon = document.querySelector('#theme-toggle i');
            const label = document.querySelector('#theme-toggle span');
            if (icon) {
                icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }
            if (label) {
                label.textContent = theme === 'dark' ? 'Light Mode' : 'Reader Mode';
            }
        }

        function bindReaderChrome() {
            const topbar = document.querySelector('.topbar');
            const scrollTopBtn = document.getElementById('scroll-top-btn');
            const themeToggle = document.getElementById('theme-toggle');

            window.addEventListener('scroll', () => {
                const currentY = window.scrollY;
                if (currentY > lastScrollY && currentY > 88) {
                    topbar?.classList.add('hidden');
                } else {
                    topbar?.classList.remove('hidden');
                }
                lastScrollY = currentY;
            }, { passive: true });

            scrollTopBtn?.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            themeToggle?.addEventListener('click', () => {
                const nextTheme = document.body.classList.contains('dark-mode') ? 'light' : 'dark';
                setTheme(nextTheme);
            });

            setTheme(localStorage.getItem(themeStorageKey) || 'dark');
        }

        async function loadStory() {
            if (!storyId || !chapterId) {
                window.location.href = 'stories.html';
                return;
            }

            let response;
            const token = getToken();

            if (token) {
                response = await fetch(`/api/stories/${storyId}`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
            }

            if (!response || !response.ok) {
                response = await fetch(`/api/stories/public/${storyId}`);
            }

            if (!response.ok) {
                alert('Failed to load chapter');
                window.location.href = 'stories.html';
                return;
            }

            const story = await response.json();
            const chapter = (story.chapters || []).find(item => String(item._id) === String(chapterId));

            if (!chapter || !chapter.hasAccess) {
                window.location.href = `reader.html?id=${storyId}`;
                return;
            }

            document.getElementById('back-link').href = `reader.html?id=${storyId}`;
            document.getElementById('story-title').textContent = story.title;
            document.getElementById('story-detail-line').textContent = `${story.author.name} | ${story.genre} | ${new Date(story.createdAt).toLocaleDateString()}`;
            document.getElementById('chapter-meta-top').textContent = `Chapter ${chapter.order}`;

            renderPanels(story, chapter);
            bindChapterNav(story);
        }

        bindReaderChrome();

        loadStory().catch(error => {
            console.error(error);
            alert('Failed to load chapter');
        });
    </script>
</body>
</html>
