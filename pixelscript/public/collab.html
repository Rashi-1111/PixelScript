<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelScript - Collaborate</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <!-- Socket.IO -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.3.2/socket.io.js"></script>
    <!-- Main CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- Collab CSS -->
    <link rel="stylesheet" href="/css/collab.css">
    <!-- Responsive CSS -->
    <link rel="stylesheet" href="/css/responsive.css">
    <style>
        .drawing-tools {
            position: fixed;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.96);
            padding: 10px;
            border-radius: 24px;
            box-shadow: 0 18px 50px rgba(0,0,0,0.18);
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
            z-index: 1000;
            backdrop-filter: blur(14px);
            border: 1px solid rgba(0, 128, 128, 0.12);
            width: 74px;
        }

        .drawing-tools.collapsed .toolbar-panel {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            pointer-events: none;
            margin-top: 0;
        }

        .toolbar-head {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .toolbar-title {
            display: none;
        }

        .toolbar-title i {
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(0, 128, 128, 0.12);
        }

        .toolbar-toggle {
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 18px;
            background: #008080;
            color: #fff;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .toolbar-toggle:hover {
            transform: scale(1.06);
            background: #006666;
        }

        .toolbar-panel {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 12px;
            max-height: 70vh;
            opacity: 1;
            transition: opacity 0.2s ease, max-height 0.25s ease;
        }

        .tool-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tool-btn {
            padding: 11px 12px;
            border: none;
            background: #f5f5f5;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            font-weight: 600;
            width: 100%;
        }

        .tool-btn.active {
            background: #008080;
            color: white;
        }

        .tool-btn:hover {
            background: #006666;
            color: white;
        }

        #color-picker {
            width: 100%;
            height: 44px;
            padding: 0;
            border: none;
            border-radius: 14px;
            cursor: pointer;
        }

        #size-slider,
        #opacity-slider {
            width: 100%;
            cursor: pointer;
        }

        .slider-stack {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
            padding: 0;
        }

        .slider-stack label {
            font-size: 1.2rem;
            font-weight: 600;
            color: #144b4b;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 6px;
        }

        .canvas-container {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin: 20px;
            height: 600px;
        }

        .canvas-grid {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            background-image:
                linear-gradient(to right, rgba(0, 128, 128, 0.12) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 128, 128, 0.12) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 2;
        }

        .canvas-grid.visible {
            opacity: 0.9;
        }

        .asset-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .asset-upload-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 12px;
            border: none;
            border-radius: 12px;
            background: #eef6f6;
            color: #0b4e4e;
            cursor: pointer;
            font-weight: 600;
        }

        .asset-upload-btn:hover {
            background: #dff0f0;
        }

        .asset-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .asset-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 10px 12px;
            border-radius: 12px;
            background: #f7f9fa;
            font-size: 13px;
        }

        .asset-item a {
            color: #0b4e4e;
            text-decoration: none;
            word-break: break-word;
        }

        #drawing-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            z-index: 1;
        }

        .chat-container {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 300px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .chat-container.minimized {
            height: 40px;
        }

        .chat-container.minimized .chat-messages,
        .chat-container.minimized .chat-input {
            display: none;
        }

        .chat-header {
            padding: 10px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #008080;
            color: white;
            border-radius: 10px 10px 0 0;
        }

        .chat-messages {
            height: 300px;
            overflow-y: auto;
            padding: 10px;
        }

        .message {
            margin: 5px 0;
            padding: 8px 12px;
            border-radius: 15px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .message.sent {
            background: #008080;
            color: white;
            margin-left: auto;
        }

        .message.received {
            background: #e9ecef;
            color: #333;
            margin-right: auto;
        }

        .message.system {
            background: #f8f9fa;
            color: #666;
            text-align: center;
            margin: 10px auto;
            font-style: italic;
            font-size: 0.9em;
        }

        .chat-input {
            padding: 10px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        .chat-input input {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }

        .chat-input button {
            background: #008080;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .chat-input button:hover {
            background: #006666;
        }

        .minimize-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #room-info {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 10px 15px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #room-url {
            font-family: monospace;
            background: #f5f5f5;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.9em;
        }

        #copy-url-btn {
            background: #008080;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        #copy-url-btn:hover {
            background: #006666;
        }

        .project-panel {
            position: fixed;
            top: 96px;
            right: 20px;
            width: 320px;
            max-height: calc(100vh - 140px);
            overflow-y: auto;
            background: rgba(255,255,255,0.96);
            border-radius: 18px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.12);
            padding: 16px;
            z-index: 999;
            transition: transform 0.28s ease, opacity 0.28s ease;
            transform: translateX(0);
            opacity: 1;
        }

        .project-panel.collapsed {
            transform: translateX(calc(100% + 14px));
            opacity: 0;
            pointer-events: none;
        }

        .project-toggle {
            position: fixed;
            top: 108px;
            right: 20px;
            width: 48px;
            height: 48px;
            border: none;
            border-radius: 16px;
            background: #0b6a68;
            color: white;
            box-shadow: 0 10px 24px rgba(0,0,0,0.14);
            cursor: pointer;
            z-index: 1001;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .project-panel h3 {
            margin: 0 0 12px;
        }

        .project-panel .field {
            margin-bottom: 12px;
        }

        .project-panel label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .project-panel input,
        .project-panel textarea {
            width: 100%;
            border: 1px solid #d9e4e5;
            border-radius: 12px;
            padding: 10px 12px;
            font: inherit;
        }

        .project-panel textarea {
            min-height: 92px;
            resize: vertical;
        }

        .panel-builder {
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid #e6ecec;
        }

        .panel-builder-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .panel-builder-head p {
            margin: 4px 0 0;
            font-size: 0.92rem;
            color: #557272;
        }

        .panel-save-btn {
            border: none;
            border-radius: 12px;
            background: #0f766e;
            color: white;
            padding: 10px 12px;
            font-weight: 600;
            cursor: pointer;
        }

        .panel-save-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .panel-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }

        .panel-card {
            display: grid;
            grid-template-columns: 76px 1fr auto;
            gap: 10px;
            align-items: center;
            padding: 10px;
            border: 1px solid #dbe6e7;
            border-radius: 14px;
            background: #fbfdfd;
        }

        .panel-card img {
            width: 76px;
            height: 76px;
            object-fit: cover;
            border-radius: 10px;
            background: #f1f5f5;
            border: 1px solid #d8e3e4;
        }

        .panel-meta strong {
            display: block;
            color: #173c3c;
            margin-bottom: 4px;
        }

        .panel-meta span {
            color: #557272;
            font-size: 0.9rem;
        }

        .panel-remove-btn {
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 999px;
            background: #fbe4e4;
            color: #a33f3f;
            cursor: pointer;
        }

        .panel-empty {
            padding: 12px;
            border-radius: 12px;
            background: #f5f8f8;
            color: #638181;
            font-size: 0.95rem;
        }

        .project-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .project-actions button,
        .project-actions a {
            border: none;
            border-radius: 12px;
            padding: 10px 12px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }

        .project-actions .primary {
            background: #0b6a68;
            color: #fff;
        }

        .project-actions .secondary {
            background: #edf5f5;
            color: #123d41;
        }

        .project-status {
            margin-top: 10px;
            font-size: 14px;
            color: #46666a;
        }
        @media (max-width: 768px) {
            .drawing-tools {
                top: auto;
                bottom: 18px;
                left: 50%;
                transform: translateX(-50%);
                width: min(86vw, 320px);
                max-width: calc(100vw - 24px);
            }

            .drawing-tools.collapsed {
                width: 74px;
            }

            .project-panel {
                position: static;
                width: auto;
                max-height: none;
                margin: 12px;
                transform: none;
                opacity: 1;
                pointer-events: auto;
            }

            .project-panel.collapsed {
                display: none;
            }

            .project-toggle {
                top: auto;
                right: 16px;
                bottom: 92px;
            }
        }
    </style>
</head>
<body>
    <div id="room-info">
        Room URL: <span id="room-url"></span>
        <button id="copy-url-btn"><i class="fas fa-copy"></i> Copy</button>
    </div>

    <div class="collab-container">
        <!-- Header -->
        <header class="collab-header">
            <div class="logo">
                <img src="images/logo.png" alt="PixelScript Logo">
            </div>
            <div class="collab-info">
                <h2>Collaboration Space</h2>
                <div class="partner-info">
                    <span id="partner-name">Waiting for partner...</span>
                </div>
            </div>
        </header>

        <button id="project-toggle" class="project-toggle" type="button" title="Show or hide story board">
            <i class="fas fa-chevron-left"></i>
        </button>

        <aside id="project-panel" class="project-panel">
            <h3>Project Story Board</h3>
            <div class="field">
                <label for="story-title-input">Story Title</label>
                <input id="story-title-input" placeholder="Project title">
            </div>
            <div class="field">
                <label for="chapter-number-input">Chapter Number</label>
                <input id="chapter-number-input" type="number" min="1" value="1" placeholder="1">
            </div>
            <div class="field">
                <label for="chapter-title-input">Chapter Title</label>
                <input id="chapter-title-input" placeholder="Chapter title">
            </div>
            <div class="field">
                <label for="story-synopsis-input">Synopsis / Notes</label>
                <textarea id="story-synopsis-input" placeholder="Writer can describe the story direction and artist can add visual notes."></textarea>
            </div>
            <div class="field">
                <label for="story-content-input">Story Content / Publish Draft</label>
                <textarea id="story-content-input" placeholder="Final story text to publish into reader space when both approve."></textarea>
            </div>
            <div class="panel-builder">
                <div class="panel-builder-head">
                    <div>
                        <label for="panel-title-input">Chapter Panels</label>
                        <p>Save each canvas state as a scroll panel for the reader episode.</p>
                    </div>
                    <button id="save-current-panel-btn" class="panel-save-btn" type="button">Save Current Panel</button>
                </div>
                <div class="field">
                    <input id="panel-title-input" placeholder="Optional panel title">
                </div>
                <div id="project-panels-list" class="panel-list"></div>
            </div>
            <div class="project-actions">
                <button id="save-project-btn" class="primary" type="button">Save Project</button>
                <button id="publish-request-btn" class="secondary" type="button">Request Publish</button>
                <a id="reader-preview-link" class="secondary" href="stories.html" style="display:none;">Open Published Story</a>
            </div>
            <div id="project-status" class="project-status">Shared notes sync through the collaboration record.</div>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Drawing Tools -->
            <div class="drawing-tools collapsed" id="drawing-tools">
                <div class="toolbar-head">
                    <button class="toolbar-toggle" id="toolbar-toggle" title="Show or hide drawing tools">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                <div class="toolbar-panel">
                    <div class="tool-group">
                        <button class="tool-btn active" data-tool="brush"><i class="fas fa-paint-brush"></i> Brush</button>
                        <button class="tool-btn" data-tool="eraser"><i class="fas fa-eraser"></i> Eraser</button>
                        <button class="tool-btn" data-tool="line"><i class="fas fa-slash"></i> Line</button>
                        <button class="tool-btn" data-tool="circle"><i class="far fa-circle"></i> Circle</button>
                        <button class="tool-btn" data-tool="rectangle"><i class="far fa-square"></i> Rectangle</button>
                    </div>
                    <div class="slider-stack">
                        <input type="color" id="color-picker" value="#000000" title="Color">
                        <label>Size <input type="range" id="size-slider" min="1" max="50" value="5" title="Size"></label>
                        <label>Opacity <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="1" title="Opacity"></label>
                    </div>
                    <div class="tool-group">
                        <button id="undo-btn" class="tool-btn"><i class="fas fa-undo"></i> Undo</button>
                        <button id="redo-btn" class="tool-btn"><i class="fas fa-redo"></i> Redo</button>
                        <button id="clear-btn" class="tool-btn"><i class="fas fa-trash"></i> Clear</button>
                        <button id="save-btn" class="tool-btn"><i class="fas fa-download"></i> Save</button>
                        <button id="grid-btn" class="tool-btn"><i class="fas fa-border-all"></i> Grid</button>
                    </div>
                    <div class="asset-panel">
                        <input type="file" id="workspace-file-input" hidden>
                        <button id="workspace-upload-btn" class="asset-upload-btn">
                            <i class="fas fa-paperclip"></i> Upload Asset
                        </button>
                        <div id="workspace-assets" class="asset-list"></div>
                    </div>
                </div>
            </div>

            <!-- Canvas Area -->
            <div class="canvas-container">
                <div class="canvas-grid" id="canvas-grid"></div>
                <canvas id="drawing-canvas"></canvas>
            </div>

            <!-- Chat Box -->
            <div class="chat-container">
                <div class="chat-header">
                    <span>Chat</span>
                    <button class="minimize-btn"><i class="fas fa-minus"></i></button>
                </div>
                <div id="chat-messages" class="chat-messages"></div>
                <div class="chat-input">
                    <input type="text" id="message-input" placeholder="Type a message...">
                    <button id="send-message"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main JavaScript -->
    <script src="/js/collab.js"></script>
</body>
</html>
