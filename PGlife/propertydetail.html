<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PG Life - Properties</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/property_list.css">
</head>
<body>

<header class="header">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" href="index.html"><img src="images/logo.png" alt="PG Life Logo"></a>
        </div>
    </nav>
</header>

<div class="page-container container my-5">
    <div class="filter-sort-container mb-4">
        <div class="filter">
            <label for="city">City:</label>
            <select id="city" class="form-select">
                <option value="delhi">Delhi</option>
                <option value="mumbai">Mumbai</option>
                <option value="bangalore">Bangalore</option>
            </select>
        </div>
        <div class="sort">
            <label for="sort">Sort by:</label>
            <select id="sort" class="form-select">
                <option value="price_low_high">Price (Low to High)</option>
                <option value="price_high_low">Price (High to Low)</option>
            </select>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="property-card">
                <img src="images/accommodation1.jpg" alt="Accommodation 1">
                <div class="property-details p-3">
                    <h5>PG in Delhi</h5>
                    <p>₹ 10,000/month</p>
                    <a href="#" class="btn btn-primary">View Details</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="property-card">
                <img src="images/accommodation2.jpg" alt="Accommodation 2">
                <div class="property-details p-3">
                    <h5>PG in Mumbai</h5>
                    <p>₹ 12,000/month</p>
                    <a href="#" class="btn btn-primary">View Details</a>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="property-card">
                <img src="images/accommodation3.jpg" alt="Accommodation 3">
                <div class="property-details p-3">
                    <h5>PG in Bangalore</h5>
                    <p>₹ 9,000/month</p>
                    <a href="#" class="btn btn-primary">View Details</a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="footer bg-dark text-white text-center py-3">
    <p>&copy; 2024 PG Life. All rights reserved.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
